name: Build
on:
  - push
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Setup Poetry
        uses: abatilo/actions-poetry@v4

      - name: Cache the virtualenv
        uses: actions/cache@v5
        with:
          path: ~/.cache/pypoetry
          key: venv-${{ hashFiles('poetry.lock') }}

      - name: Install Poetry dependencies
        run: poetry install

      - name: Run black
        run: poetry run black --check workspace_onboarding_ux.py

      - name: Run flake8
        run: poetry run flake8 workspace_onboarding_ux.py

      - name: Run pylint
        run: poetry run pylint workspace_onboarding_ux.py

      - name: Run mypy
        run: poetry run mypy --strict --scripts-are-modules workspace_onboarding_ux.py

  docker:
    name: Docker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          tags: ghcr.io/robojackets/workspace-onboarding-ux:latest
          network: host
          pull: true
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

    outputs:
      image-digest: ${{ steps.build.outputs.digest }}

  deploy-production:
    name: Deploy
    needs: [lint, docker]
    uses: ./.github/workflows/deploy.yml
    concurrency:
      group: deploy-production
      cancel-in-progress: true
    permissions:
      id-token: write
      contents: read
      packages: read
    with:
      image-digest: ${{ needs.docker.outputs.image-digest }}
      environment: production

  prune-stale-images:
    name: Prune stale images
    runs-on: ubuntu-latest
    needs: [docker, deploy-production]
    permissions:
      packages: write
    steps:
      - uses: snok/container-retention-policy@v3.0.1
        with:
          account: robojackets
          token: ${{ secrets.GITHUB_TOKEN }}
          image-names: workspace-onboarding-ux
          skip-shas: ${{ needs.docker.outputs.image-digest }}
          cut-off: 0s
